<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title></title>
<link rel="stylesheet" href="style.css?v=7" />
</head>
<body class="chasse-body">
<main class="stage stage-chasse">

  <header class="chasse-title">
    <div class="ct-line1" id="ch-title-line1"></div>
    <div class="ct-line2" id="ch-title-line2"></div>
  </header>

  <section class="chasse-hud">
    <div class="ch-block">
      <span class="ch-lbl" id="ch-round-label"></span>
      <span class="ch-val"><span id="ch-round">1</span> / <span id="ch-round-total"></span></span>
    </div>
    <div class="ch-block big timer" id="ch-timer-block">
      <span class="ch-lbl" id="ch-time-label"></span>
      <span class="ch-val timer-val"><span id="ch-time">—</span><span class="unit" id="ch-time-unit"></span></span>
    </div>
    <div class="ch-block ch-restart-block">
      <button id="restart-btn" class="audio-btn restart-btn-ingame" title="" aria-label="">
        <span class="audio-icon">↻</span>
        <span class="audio-lbl" id="restart-btn-label"></span>
      </button>
      <button id="mode-btn" class="audio-btn mode-btn-ingame" title="" aria-label="">
        <span class="audio-icon">🎚</span>
        <span class="audio-lbl" id="mode-btn-label"></span>
      </button>
    </div>
    <div class="ch-block ch-audio-block">
      <button id="ambience-toggle" class="audio-btn" title="" aria-label="">
        <span class="audio-icon">🎵</span>
        <span class="audio-lbl" id="ambience-btn-label"></span>
      </button>
      <button id="sfx-toggle" class="audio-btn" title="" aria-label="">
        <span class="audio-icon">🐔</span>
        <span class="audio-lbl" id="sfx-btn-label"></span>
      </button>
    </div>
    <div class="ch-block ch-home-block">
      <a href="index.html" class="audio-btn home-btn" id="home-btn" title="" aria-label="">
        <span class="audio-icon">⌂</span>
      </a>
    </div>
  </section>

  <section class="chasse-grid-wrap">
    <div class="chasse-grid" id="ch-grid"></div>
  </section>

  <div class="ch-transition" id="ch-transition"></div>

  <div class="ch-overlay" id="ch-overlay">
    <!-- INTRO -->
    <div class="ch-screen" id="ch-intro">
      <div class="ch-emoji-big">🐔🍮🐔</div>
      <h2 id="intro-title"></h2>
      <p class="ch-lead-short" id="intro-lead"></p>
      <div class="mode-picker">
        <h3 class="mp-title" id="intro-mode-title"></h3>
        <div class="mode-cards">
          <button class="mode-card mc-beginner" data-mode="beginner">
            <div class="mc-icon">🌿</div>
            <div class="mc-info">
              <div class="mc-label" id="mode-beginner-label"></div>
              <div class="mc-sub" id="mode-beginner-sub"></div>
            </div>
          </button>
          <button class="mode-card mc-medium" data-mode="medium">
            <div class="mc-icon">🍮</div>
            <div class="mc-info">
              <div class="mc-label" id="mode-medium-label"></div>
              <div class="mc-sub" id="mode-medium-sub"></div>
            </div>
          </button>
          <button class="mode-card mc-hardcore" data-mode="hardcore">
            <div class="mc-icon">🔥</div>
            <div class="mc-info">
              <div class="mc-label" id="mode-hardcore-label"></div>
              <div class="mc-sub" id="mode-hardcore-sub"></div>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- WIN -->
    <div class="ch-screen" id="ch-win" hidden>
      <div class="ch-emoji-big celebrate">🍮✨</div>
      <h2 id="win-title"></h2>
      <p class="ch-big" id="win-subtitle"></p>
      <div class="ch-invite">
        <div class="invite-line1" id="win-invite-line1"></div>
        <div class="invite-title" id="win-invite-title"></div>
        <div class="invite-meta" id="win-invite-meta"></div>
        <div class="invite-hint" id="win-invite-hint"></div>
      </div>
      <div class="mode-picker">
        <h3 class="mp-title" id="win-mode-title"></h3>
        <div class="mode-cards">
          <button class="mode-card mc-beginner" data-mode="beginner" data-from="win">
            <div class="mc-icon">🌿</div>
            <div class="mc-info"><div class="mc-label" id="mode-win-beginner-label"></div></div>
          </button>
          <button class="mode-card mc-medium" data-mode="medium" data-from="win">
            <div class="mc-icon">🍮</div>
            <div class="mc-info"><div class="mc-label" id="mode-win-medium-label"></div></div>
          </button>
          <button class="mode-card mc-hardcore" data-mode="hardcore" data-from="win">
            <div class="mc-icon">🔥</div>
            <div class="mc-info"><div class="mc-label" id="mode-win-hardcore-label"></div></div>
          </button>
        </div>
      </div>
      <div class="ch-actions">
        <a href="index.html" class="ch-btn" id="win-hub-label"></a>
      </div>
    </div>

    <!-- LOSE -->
    <div class="ch-screen" id="ch-lose" hidden>
      <div class="ch-emoji-big sad" id="ch-lose-emoji">😶</div>
      <h2 id="ch-lose-title"></h2>
      <p class="ch-big" id="ch-lose-msg"></p>
      <div class="ch-invite consolation">
        <div class="invite-line1" id="lose-invite-line1"></div>
        <div class="invite-title" id="lose-invite-title"></div>
        <div class="invite-meta" id="lose-invite-meta"></div>
        <div class="invite-hint" id="lose-invite-hint"></div>
      </div>
      <div class="mode-picker">
        <h3 class="mp-title" id="lose-mode-title"></h3>
        <div class="mode-cards">
          <button class="mode-card mc-beginner" data-mode="beginner" data-from="lose">
            <div class="mc-icon">🌿</div>
            <div class="mc-info"><div class="mc-label" id="mode-lose-beginner-label"></div></div>
          </button>
          <button class="mode-card mc-medium" data-mode="medium" data-from="lose">
            <div class="mc-icon">🍮</div>
            <div class="mc-info"><div class="mc-label" id="mode-lose-medium-label"></div></div>
          </button>
          <button class="mode-card mc-hardcore" data-mode="hardcore" data-from="lose">
            <div class="mc-icon">🔥</div>
            <div class="mc-info"><div class="mc-label" id="mode-lose-hardcore-label"></div></div>
          </button>
        </div>
      </div>
    </div>
  </div>

</main>
<script src="js/audio.js?v=7"></script>
<script src="js/wordings.js?v=7"></script>
<script src="js/chasse.js?v=7"></script>
</body>
</html>
